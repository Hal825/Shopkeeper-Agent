#要同步哪些表
#每张表有哪些字段
#字段的角色、描述、别名是什么
#哪些字段后续还要同步真实取值
#哪些指标要进入知识库

#配置驱动:脚本本身不写死业务范围，而是由配置文件来决定这次要同步什么内容。
#不是所有表都值得同步,数仓内容将来一定会有增量变化,字段是否同步真实取值也应该是可配的...


#tables 是一个列表，列表里的每个元素都表示一张要同步的表。
#
#每张表至少包含这几个信息：
#
#name：表名
#role：这张表是维度表还是事实表
#description：这张表的业务含义
#columns：这张表下哪些字段要进入知识库
#这里的 role 也很关键：
#
#dim：维度表
#fact：事实表


#    columns 也是一个列表，里面每个元素都表示一个字段。
#
#    每个字段主要有 5 个配置：
#
#    name：字段名
#    role：字段角色
#    description：字段业务含义
#    alias：字段别名
#    sync：是否同步真实取值到 Elasticsearch
#    字段级 role 一般有这几种：
#
#    primary_key
#    foreign_key
#    dimension
#    measure
#    这里的 alias 很重要，因为用户提问时经常不会直接说真实字段名，而会说业务口语。
#    例如 order_amount 的别名可以是：销售额、订单金额、收入。
tables:
  - name: dim_region
    role: dim
    description: 地区维度表，用于描述订单发生的地理区域信息。
    columns:
      - name: region_id
        role: primary_key
        description: 地区唯一标识。
        alias: [地区ID, 区域ID]
        sync: false

      - name: province
        role: dimension
        description: 订单所属的省份名称。
        alias: [省份, 省, 所在省份]
        sync: true

      - name: region_name
        role: dimension
        description: 订单所属的大区名称，如华东、华南等。
        alias: [地区, 区域, 大区]
        sync: true

      - name: country
        role: dimension
        description: 地区所属国家名称。
        alias: [国家, 国家名称]
        sync: true
#        sync: true：表示这个字段的真实取值需要同步到 Elasticsearch
#        sync: false：表示只保留字段元信息，不同步真实取值

  - name: dim_customer
    role: dim
    description: 客户维度表，描述下单客户的基本属性。
    columns:
      - name: customer_id
        role: primary_key
        description: 客户唯一标识。
        alias: [客户ID, 用户ID]
        sync: false

      - name: customer_name
        role: dimension
        description: 客户名称。
        alias: [客户名称, 用户名称]
        sync: true

      - name: gender
        role: dimension
        description: 客户性别。
        alias: [性别]
        sync: true

      - name: member_level
        role: dimension
        description: 客户会员等级。
        alias: [会员等级, 用户等级]
        sync: true

  - name: dim_product
    role: dim
    description: 商品维度表，描述商品的基本属性信息。
    columns:
      - name: product_id
        role: primary_key
        description: 商品唯一标识。
        alias: [商品ID, 产品ID]
        sync: false

      - name: product_name
        role: dimension
        description: 商品名称。
        alias: [商品名称, 产品名称]
        sync: true

      - name: category
        role: dimension
        description: 商品所属品类。
        alias: [商品类别, 品类, 分类]
        sync: true

      - name: brand
        role: dimension
        description: 商品品牌名称。
        alias: [品牌, 品牌名称]
        sync: true

  - name: dim_date
    role: dim
    description: 时间维度表，用于多时间粒度分析。
    columns:
      - name: date_id
        role: primary_key
        description: 日期唯一标识，格式 yyyyMMdd。
        alias: [日期ID, 日期]
        sync: false

      - name: year
        role: dimension
        description: 年份。
        alias: [年, 年份]
        sync: false

      - name: quarter
        role: dimension
        description: 季度。
        alias: [季度]
        sync: true

      - name: month
        role: dimension
        description: 月份。
        alias: [月, 月份]
        sync: false

      - name: day
        role: dimension
        description: 日。
        alias: [日, 天]
        sync: false

  - name: fact_order
    role: fact
    description: 订单事实表，记录订单数量和金额等核心指标。
    columns:
      - name: order_id
        role: primary_key
        description: 订单唯一标识。
        alias: [订单ID]
        sync: false

      - name: customer_id
        role: foreign_key
        description: 关联客户维度的外键。
        alias: [客户ID, 用户ID]
        sync: false

      - name: product_id
        role: foreign_key
        description: 关联商品维度的外键。
        alias: [商品ID, 产品ID]
        sync: false

      - name: date_id
        role: foreign_key
        description: 关联时间维度的外键。
        alias: [日期, 下单日期]
        sync: false

      - name: region_id
        role: foreign_key
        description: 关联地区维度的外键。
        alias: [地区ID, 区域ID]
        sync: false

      - name: order_quantity
        role: measure
        description: 订单中商品的购买数量。
        alias: [销量, 购买数量, 件数]
        sync: false

      - name: order_amount
        role: measure
        description: 订单金额。
        alias: [销售额, 订单金额, 收入]
        sync: false

metrics:
  - name: GMV
    description: 全称Gross Merchandise Value，表示所有订单的成交金额总和。
    relevant_columns:
      - fact_order.order_amount
    alias: [成交总额, 订单总额]
  - name: AOV
    description: 全称Average Order Value，表示所有订单的成交金额平均值。
    relevant_columns:
      - fact_order.order_amount
    alias: [平均单价, 平均订单金额]
  # --- 1. 用户类新增指标 ---
  - name: Repeat Purchase Rate
    description: 指在特定周期内，发生多次购买行为的消费者占比，直接体现了平台或店铺的用户黏性和忠诚度。
    relevant_columns:
      - fact_order.customer_id
    alias: [ 复购率, 重复购买率, RPR, 用户留存 ]

  - name: Customer Lifetime Value
    description: 指每个客户在其整个生命周期内能够为平台带来的总价值。在这里简化为总销售额除以总客户数，用于评估客户群体的平均价值。
    relevant_columns:
      - fact_order.order_amount
    alias: [ 客户生命周期价值, 客户总价值, LTV, CLV ]

  - name: Repurchase Frequency
    description: 指每个购买客户的平均下单次数。
    relevant_columns:
      - fact_order.customer_id
    alias: [ 人均购买频次, 复购频率, RF ]

  # --- 2. 运营类新增指标 ---
  - name: Total Orders
    description: 指定时间段内，平台实际成交的订单总数量。
    relevant_columns:
      - fact_order.order_id
    alias: [ 总订单数, 订单量, Order Count ]

  - name: Conversion Rate
    description: 访客最终完成购买行为的比例，即“订单数”与“访客数”的比率，是衡量流量变现效率的核心指标。
    relevant_columns:
      - fact_order.order_id
    alias: [ 转化率, CVR, 成交转化率 ]

  - name: Average Items Per Order
    description: 指每一笔订单中平均包含的商品件数，反映了商品组合和交叉销售的效果。
    relevant_columns:
      - fact_order.order_quantity
    alias: [ 连带率, 客件数, AIPO, 笔单价 ]

  # --- 3. 商品类新增指标 ---
  - name: Per-SKU Sales
    description: 指特定商品或商品品类所产生的销售额总和，用于识别畅销品与库存规划。
    relevant_columns:
      - fact_order.order_amount
    alias: [ 商品销售额, 单品销售额, 品类销售额, Product Sales, Category Sales ]
#    这里的 relevant_columns 很重要，因为它把“指标”和“底层字段”连接起来了。后面往元数据库写数据时，column_metric 这张关系表就是根据这个字段来生成的。

