services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "@Lzs0825"
      MYSQL_USER: lzs
      MYSQL_PASSWORD: Lzs666
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --skip-character-set-client-handshake

  elasticsearch:
    build: ./elasticsearch
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.19.10
    container_name: kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: qdrant
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  embedding:
#    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.4
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    platform: linux/amd64
    container_name: embedding
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      MODEL_ID: /models/bge-small-zh
#      MAX_CONCURRENT_REQUESTS: "16"
#      MAX_BATCH_TOKENS: "16384"
#      16 并发 + 16384 tokens ❌（直接炸）
#      低并发 + 小 batch ✅（稳定）
      MAX_CONCURRENT_REQUESTS: "2"
      MAX_BATCH_TOKENS: "4096"
      OPENAI_COMPATIBLE: "true"
    volumes:
      - ./embedding/bge-small-zh:/models/bge-small-zh

volumes:
  mysql_data:
  es_data:
  qdrant_data: